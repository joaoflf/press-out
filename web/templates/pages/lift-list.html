{{template "base.html" .}}

{{define "content"}}
<div class="max-w-[430px] mx-auto p-4">
    <h1 class="text-xl font-semibold mb-6">press-out</h1>

    {{if .Empty}}
    <div class="text-center py-12">
        <p class="text-base-content/60 mb-2">No lifts yet</p>
        <p class="text-sm text-base-content/40">Upload a video to get started</p>
    </div>
    {{else}}
    <div class="space-y-3 mb-4">
        {{range .Lifts}}
        {{template "lift-list-item" .}}
        {{end}}
    </div>
    {{end}}

    <button class="btn btn-primary w-full h-12 text-white"
            onclick="document.getElementById('upload-modal').showModal()">
        Upload Lift
    </button>
</div>

{{template "upload-modal" .}}
{{end}}
