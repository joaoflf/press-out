{{template "base.html" .}}

{{define "content"}}
<div class="max-w-[430px] mx-auto">
    {{template "video-player" .}}

    <div class="p-4 flex flex-col gap-4">
        <div class="flex items-center gap-3">
            <a href="/" class="flex items-center justify-center w-11 h-11 -ml-2" aria-label="Back to lift list">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="#2D2D2D" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <div>
                <h1 class="text-xl font-semibold">{{.DisplayType}}</h1>
                <p class="text-sm text-base-content/60">{{.DisplayDate}}</p>
            </div>
        </div>

        {{if .Processing}}
        <div hx-ext="sse" sse-connect="/lifts/{{.ID}}/events" sse-close="pipeline-done">
            {{template "pipeline-stages" .}}
        </div>
        {{else}}
        <button
            class="btn h-10 bg-transparent border-none shadow-none text-base-content/60 hover:text-sage gap-2"
            hx-post="/lifts/{{.ID}}/reprocess"
            hx-on::after-request="window.location.reload()"
            aria-label="Re-process lift"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Re-process
        </button>
        {{end}}

        <div id="coaching-section"></div>

        <div id="phase-timeline-section"></div>

        <div id="metrics-section"></div>

        <div class="pt-4 border-t border-base-300">
            <button
                class="btn btn-ghost btn-sm text-error"
                hx-delete="/lifts/{{.ID}}"
                hx-confirm="Delete this lift? This cannot be undone."
                aria-label="Delete lift"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                Delete Lift
            </button>
        </div>
    </div>
</div>
{{end}}
