{{define "lift-list-item"}}
{{if .Processing}}
<div hx-ext="sse" sse-connect="/lifts/{{.ID}}/events" sse-close="pipeline-done">
    <a href="/lifts/{{.ID}}" class="flex items-center gap-3 p-3 rounded-lg bg-neutral min-h-[56px]">
        <div class="w-12 h-12 rounded bg-primary/10 flex items-center justify-center flex-shrink-0">
            <span class="loading loading-spinner loading-sm text-primary"></span>
        </div>
        <div class="flex-1 min-w-0">
            <div class="font-medium">{{.DisplayType}}</div>
            <div sse-swap="pipeline-status" hx-swap="innerHTML">
                <div class="flex items-center gap-1.5">
                    <span class="text-xs text-base-content/40">Processing...</span>
                </div>
            </div>
        </div>
    </a>
</div>
{{else}}
<a href="/lifts/{{.ID}}" class="flex items-center gap-3 p-3 rounded-lg bg-neutral min-h-[56px]">
    {{if .HasThumbnail}}
    <img src="/data/lifts/{{.ID}}/thumbnail.jpg" alt="" class="w-12 h-12 rounded object-cover flex-shrink-0">
    {{else}}
    <div class="w-12 h-12 rounded bg-secondary/30 flex items-center justify-center flex-shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-base-content/30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
    </div>
    {{end}}
    <div class="flex-1 min-w-0">
        <div class="font-medium">{{.DisplayType}}</div>
        <div class="text-sm text-base-content/60">{{.DisplayDate}}</div>
    </div>
</a>
{{end}}
{{end}}
